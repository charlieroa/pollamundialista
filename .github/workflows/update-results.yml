name: Actualizar resultados Mundial 2026

# Baja resultados reales de TheSportsDB, regenera grupos.html / index.html
# y commitea si hay cambios. Vercel redepliega solo con cada push.

on:
  schedule:
    - cron: "0 */3 * * *"   # cada 3 horas (UTC)
  workflow_dispatch:          # permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bajar resultados reales (TheSportsDB)
        run: python fetch_results.py

      - name: Regenerar páginas
        run: |
          python predict.py
          python bracket.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json grupos.html index.html
          if git diff --staged --quiet; then
            echo "Sin cambios; nada que commitear."
          else
            git commit -m "Auto: actualizar resultados Mundial 2026 [skip ci]"
            git push
          fi
